name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Next.js web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enforce banned HTTP client policy
        run: |
          set -euo pipefail
          matches="$(
            grep -RInE '(^|[^A-Za-z0-9_@-])(axios|@nuxtjs/axios|axios-mock-adapter|axios-retry)([^A-Za-z0-9_-]|$)' . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=.next \
              --exclude='*.md' \
              --exclude='ci.yml' || true
          )"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo "Banned HTTP client references found. Use fetch, undici, or an approved existing abstraction."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_SSO_API_BASE_URL: http://localhost:8080/api/v1
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
          NEXT_PUBLIC_KEYCLOAK_REALM: seowallet
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: seowallet-web
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
